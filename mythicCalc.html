<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythicCalc - Schmiede-Rechner</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --dark-base: #050709;
            --card-bg: rgba(15, 20, 25, 0.95);
            --text-light: #f4f4f4;
            --rune-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        body {
            background-color: var(--dark-base);
            background-image: linear-gradient(rgba(5, 7, 9, 0.6), rgba(5, 7, 9, 0.9)), url('viking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 100px 0 120px;
            text-align: center;
            background: linear-gradient(rgba(5, 7, 9, 0.3), rgba(5, 7, 9, 0.8)), url('viking-bg.png');
            background-size: cover;
            position: relative;
            border-bottom: 3px solid var(--gold);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 100%, 0 90%);
            margin-bottom: 40px;
        }

        .lang-switch { position: absolute; top: 30px; right: 40px; z-index: 20; }
        .lang-btn {
            background: rgba(0,0,0,0.8); color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 18px; cursor: pointer; font-family: 'Cinzel', serif;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); margin-left: 10px;
        }
        .lang-btn.active { background: var(--gold); color: black; box-shadow: var(--rune-shadow); }

        .back-nav { width: 100%; max-width: 1100px; margin-bottom: 20px; padding: 0 20px; box-sizing: border-box; align-self: center; display: flex; }
        .back-btn {
            background: rgba(0,0,0,0.7); color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 20px; text-decoration: none; font-family: 'Cinzel', serif; font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: black; }

        .container {
            width: 100%; max-width: 1100px; background: var(--card-bg);
            padding: 40px; border: 1px solid rgba(212, 175, 55, 0.3);
            box-sizing: border-box; margin-bottom: 60px; backdrop-filter: blur(15px);
        }

        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-transform: uppercase; letter-spacing: 4px; margin: 0; }

        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .input-section, .result-section { background: rgba(0,0,0,0.3); padding: 25px; border: 1px solid rgba(212, 175, 55, 0.1); }
        h3 { font-family: 'Cinzel', serif; color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-top: 0; }
        
        .resource-row { display: flex; align-items: center; margin-bottom: 15px; justify-content: space-between; }
        input { 
            background: #000; border: 1px solid var(--gold); color: white; 
            padding: 8px; width: 80px; text-align: center; font-family: 'Montserrat', sans-serif;
        }
        
        .result-item { margin-bottom: 15px; font-size: 16px; }
        .needed { color: #ff4444; font-weight: bold; }
        .excess { color: #44ff44; font-weight: bold; }

        footer {
            width: 100%; background: #020304; padding: 60px 20px; text-align: center;
            color: #666; font-size: 13px; border-top: 1px solid #1a1a1a; box-sizing: border-box;
        }
        @media (max-width: 768px) { .calc-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="lang-switch">
        <button id="btn-de" class="lang-btn active" onclick="setLang('de')">DE</button>
        <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <h1 id="txt-title">MythicCalc Schmiede</h1>
</header>

<div class="back-nav">
    <a href="index.html" class="back-btn" id="txt-back">« Zurück zur Startseite</a>
</div>

<div class="container">
    <div class="calc-grid">
        <div class="input-section">
            <h3 id="txt-input-h">Vorhandene Materialien</h3>
            <div id="inputs">
                <div class="resource-row"><span>Material A (Legendär):</span> <input type="number" id="matA" value="0" oninput="calc()"></div>
                <div class="resource-row"><span>Material B (Legendär):</span> <input type="number" id="matB" value="0" oninput="calc()"></div>
                <div class="resource-row"><span>Material C (Legendär):</span> <input type="number" id="matC" value="0" oninput="calc()"></div>
                <div class="resource-row"><span>Material D (Legendär):</span> <input type="number" id="matD" value="0" oninput="calc()"></div>
            </div>
            <h3 style="margin-top:20px" id="txt-target-h">Ziel (Bedarf)</h3>
            <div class="resource-row"><span>Zielmenge pro Material:</span> <input type="number" id="target" value="20" oninput="calc()"></div>
        </div>

        <div class="result-section">
            <h3 id="txt-result-h">Berechnung (2:1 Logik)</h3>
            <div id="results">
                </div>
            <div id="summary" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--gold);"></div>
        </div>
    </div>
</div>

<script>
    const trans = {
        de: { back: "« Zurück zur Startseite", title: "MythicCalc Schmiede", inputH: "Vorhandene Materialien", targetH: "Ziel (Bedarf)", resultH: "Berechnung (2:1 Logik)" },
        en: { back: "« Back to Home", title: "MythicCalc Smithy", inputH: "Available Materials", targetH: "Target (Required)", resultH: "Calculation (2:1 Logic)" }
    };

    function setLang(lang) {
        document.getElementById('btn-de').classList.toggle('active', lang==='de');
        document.getElementById('btn-en').classList.toggle('active', lang==='en');
        document.getElementById('txt-back').innerText = trans[lang].back;
        document.getElementById('txt-title').innerText = trans[lang].title;
        document.getElementById('txt-input-h').innerText = trans[lang].inputH;
        document.getElementById('txt-target-h').innerText = trans[lang].targetH;
        document.getElementById('txt-result-h').innerText = trans[lang].resultH;
    }

    function calc() {
        const target = parseInt(document.getElementById('target').value) || 0;
        const ids = ['matA', 'matB', 'matC', 'matD'];
        let materials = ids.map(id => ({ id: id, val: parseInt(document.getElementById(id).value) || 0 }));
        
        let excessPool = 0;
        let totalNeeded = 0;
        let html = "";

        materials.forEach(m => {
            let diff = m.val - target;
            if(diff > 0) {
                excessPool += diff;
                html += `<div class="result-item">${m.id.replace('mat', 'Material ')}: <span class="excess">+${diff} Überschuss</span></div>`;
            } else {
                totalNeeded += Math.abs(diff);
                html += `<div class="result-item">${m.id.replace('mat', 'Material ')}: <span class="needed">${diff} Benötigt</span></div>`;
            }
        });

        const convertBenefit = Math.floor(excessPool / 2);
        const finalMissing = Math.max(0, totalNeeded - convertBenefit);

        document.getElementById('results').innerHTML = html;
        document.getElementById('summary').innerHTML = `
            <div>Überschuss-Pool: ${excessPool}</div>
            <div>Möglich durch Tausch (2:1): <span class="excess">+${convertBenefit}</span></div>
            <div style="font-size: 1.2em; font-weight: bold; color: var(--gold); margin-top:10px">
                Noch zu sammeln: ${finalMissing}
            </div>
        `;
    }
    calc();
</script>
</body>
</html>
