<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythicCalc - Schmiede-Rechner</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --viking-blue: #1a3a4a;
            --dark-base: #050709;
            --card-bg: rgba(15, 20, 25, 0.95);
            --text-light: #f4f4f4;
            --rune-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        body {
            background-color: var(--dark-base);
            background-image: linear-gradient(rgba(5, 7, 9, 0.6), rgba(5, 7, 9, 0.9)), url('viking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 100px 0 120px;
            text-align: center;
            background: linear-gradient(rgba(5, 7, 9, 0.3), rgba(5, 7, 9, 0.8)), url('viking-bg.png');
            background-size: cover;
            position: relative;
            border-bottom: 3px solid var(--gold);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 100%, 0 90%);
            margin-bottom: 40px;
        }

        .lang-switch {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 20;
        }

        .lang-btn {
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            transition: 0.3s;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            margin-left: 10px;
        }

        .lang-btn.active {
            background: var(--gold);
            color: black;
            box-shadow: var(--rune-shadow);
        }

        .back-nav {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 20px;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
        }

        .back-btn {
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 20px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--gold);
            color: black;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            padding: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-sizing: border-box;
            margin-bottom: 60px;
            backdrop-filter: blur(15px);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            font-size: clamp(24px, 5vw, 42px);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .input-section, .result-section {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .resource-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            justify-content: space-between;
        }

        .resource-row span {
            font-weight: bold;
            font-size: 14px;
        }

        input {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--gold);
            color: white;
            padding: 10px;
            width: 100px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .result-item {
            margin-bottom: 15px;
            font-size: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-between;
        }

        .needed { color: #ff4444; font-weight: bold; }
        .excess { color: #44ff44; font-weight: bold; }

        .summary-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            text-align: center;
        }

        footer {
            width: 100%;
            background: #020304;
            padding: 60px 20px;
            text-align: center;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #1a1a1a;
            box-sizing: border-box;
        }

        @media (max-width: 850px) {
            .calc-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="lang-switch">
        <button id="btn-de" class="lang-btn active" onclick="setLang('de')">DE</button>
        <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <h1 id="txt-title">MythicCalc Schmiede</h1>
</header>

<div class="back-nav">
    <a href="index.html" class="back-btn" id="txt-back">« Zurück zur Startseite</a>
</div>

<div class="container">
    <div class="calc-grid">
        <div class="input-section">
            <h3 id="txt-input-h">Vorhanden (Legendär)</h3>
            <div class="resource-row"><span>Material A:</span> <input type="number" id="matA" value="0" oninput="calc()"></div>
            <div class="resource-row"><span>Material B:</span> <input type="number" id="matB" value="0" oninput="calc()"></div>
            <div class="resource-row"><span>Material C:</span> <input type="number" id="matC" value="0" oninput="calc()"></div>
            <div class="resource-row"><span>Material D:</span> <input type="number" id="matD" value="0" oninput="calc()"></div>
            
            <h3 style="margin-top:40px" id="txt-target-h">Ziel (Bedarf)</h3>
            <div class="resource-row"><span id="txt-target-label">Menge pro Material:</span> <input type="number" id="target" value="20" oninput="calc()"></div>
        </div>

        <div class="result-section">
            <h3 id="txt-result-h">Berechnung</h3>
            <div id="results"></div>
            
            <div class="summary-box" id="summary">
                </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Tasaro Technologies GmbH. Alle Rechte vorbehalten.</p>
</footer>

<script>
    const trans = {
        de: {
            back: "« Zurück zur Startseite",
            title: "MythicCalc Schmiede",
            inputH: "Vorhanden (Legendär)",
            targetH: "Ziel (Bedarf)",
            targetLabel: "Menge pro Material:",
            resultH: "Berechnung",
            needed: "Benötigt",
            excess: "Überschuss",
            totalMissing: "Noch zu sammeln:"
        },
        en: {
            back: "« Back to Home",
            title: "MythicCalc Smithy",
            inputH: "Available (Legendary)",
            targetH: "Target (Required)",
            targetLabel: "Amount per Material:",
            resultH: "Calculation",
            needed: "Needed",
            excess: "Excess",
            totalMissing: "Still to collect:"
        }
    };

    let currentLang = 'de';

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btn-de').classList.toggle('active', lang==='de');
        document.getElementById('btn-en').classList.toggle('active', lang==='en');
        
        document.getElementById('txt-back').innerText = trans[lang].back;
        document.getElementById('txt-title').innerText = trans[lang].title;
        document.getElementById('txt-input-h').innerText = trans[lang].inputH;
        document.getElementById('txt-target-h').innerText = trans[lang].targetH;
        document.getElementById('txt-target-label').innerText = trans[lang].targetLabel;
        document.getElementById('txt-result-h').innerText = trans[lang].resultH;
        
        calc();
    }

    function calc() {
        const target = parseInt(document.getElementById('target').value) || 0;
        const mats = [
            { id: 'A', val: parseInt(document.getElementById('matA').value) || 0 },
            { id: 'B', val: parseInt(document.getElementById('matB').value) || 0 },
            { id: 'C', val: parseInt(document.getElementById('matC').value) || 0 },
            { id: 'D', val: parseInt(document.getElementById('matD').value) || 0 }
        ];

        let totalExcess = 0;
        let totalNeeded = 0;
        let html = "";

        mats.forEach(m => {
            let diff = m.val - target;
            if (diff >= 0) {
                totalExcess += diff;
                html += `<div class="result-item"><span>Material ${m.id}</span> <span class="excess">+${diff} ${trans[currentLang].excess}</span></div>`;
            } else {
                totalNeeded += Math.abs(diff);
                html += `<div class="result-item"><span>Material ${m.id}</span> <span class="needed">${diff} ${trans[currentLang].needed}</span></div>`;
            }
        });

        // 2:1 Logic: Each 2 excess can fill 1 need
        const potentialFromSwap = Math.floor(totalExcess / 2);
        const remainingMissing = Math.max(0, totalNeeded - potentialFromSwap);

        document.getElementById('results').innerHTML = html;
        document.getElementById('summary').innerHTML = `
            <div style="margin-bottom: 10px;">${trans[currentLang].excess} Pool: <strong>${totalExcess}</strong></div>
            <div style="margin-bottom: 10px;">Tausch-Bonus (2:1): <span class="excess">+${potentialFromSwap}</span></div>
            <div style="font-size: 1.3em; color: var(--gold-bright); font-family: 'Cinzel', serif;">
                ${trans[currentLang].totalMissing} ${remainingMissing}
            </div>
        `;
    }

    // Init
    calc();
</script>

</body>
</html>
