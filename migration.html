<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viking Rise - Migration & Kosten</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --dark-base: #050709;
            --card-bg: rgba(15, 20, 25, 0.95);
            --text-light: #f4f4f4;
            --rune-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        body {
            background-color: var(--dark-base);
            background-image: linear-gradient(rgba(5, 7, 9, 0.6), rgba(5, 7, 9, 0.9)), url('viking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 100px 0 120px;
            text-align: center;
            background: linear-gradient(rgba(5, 7, 9, 0.3), rgba(5, 7, 9, 0.8)), url('viking-bg.png');
            background-size: cover;
            position: relative;
            border-bottom: 3px solid var(--gold);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 100%, 0 90%);
            margin-bottom: 40px;
        }

        .lang-switch { position: absolute; top: 30px; right: 40px; z-index: 20; }
        .lang-btn {
            background: rgba(0,0,0,0.8); color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 18px; cursor: pointer; font-family: 'Cinzel', serif;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); margin-left: 10px;
        }
        .lang-btn.active { background: var(--gold); color: black; box-shadow: var(--rune-shadow); }

        .back-nav { width: 100%; max-width: 1100px; margin-bottom: 20px; padding: 0 20px; box-sizing: border-box; align-self: center; display: flex; }
        .back-btn {
            background: rgba(0,0,0,0.7); color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 20px; text-decoration: none; font-family: 'Cinzel', serif; font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: black; }

        .container {
            width: 100%; max-width: 1100px; background: var(--card-bg);
            padding: 40px; border: 1px solid rgba(212, 175, 55, 0.3);
            box-sizing: border-box; margin-bottom: 60px; backdrop-filter: blur(15px);
        }

        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-transform: uppercase; letter-spacing: 4px; margin: 0; }

        .tab-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(0,0,0,0.6); color: var(--gold); border: 1px solid var(--gold);
            padding: 12px 25px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold;
            transition: 0.3s; min-width: 160px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .tab-btn.active { background: var(--gold); color: black; box-shadow: var(--rune-shadow); }

        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px;}
        th, td { padding: 12px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); text-align: center; }
        th { color: var(--gold); font-family: 'Cinzel', serif; background: rgba(212, 175, 55, 0.1); }
        .cost-val { color: var(--gold-bright); font-weight: bold; }

        footer {
            width: 100%; background: #020304; padding: 60px 20px; text-align: center;
            color: #666; font-size: 13px; border-top: 1px solid #1a1a1a; box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>
    <div class="lang-switch">
        <button id="btn-de" class="lang-btn active" onclick="setLang('de')">DE</button>
        <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <h1 id="txt-title">Königreich Migration</h1>
</header>

<div class="back-nav">
    <a href="index.html" class="back-btn" id="txt-back">« Zurück zur Startseite</a>
</div>

<div class="container">
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-rec" onclick="updateView('recommended')">Recommended</button>
        <button class="tab-btn" id="tab-com" onclick="updateView('common')">Common</button>
        <button class="tab-btn" id="tab-str" onclick="updateView('strong')">Strong</button>
    </div>

    <div class="table-container">
        <table id="mig-table">
            <thead>
                <tr>
                    <th id="th-p">Macht</th>
                    <th>WK</th>
                    <th>S1</th>
                    <th>S2</th>
                    <th>S3</th>
                    <th>CS</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const trans = {
        de: { back: "« Zurück zur Startseite", title: "Königreich Migration", power: "Macht" },
        en: { back: "« Back to Home", title: "Kingdom Migration", power: "Might" }
    };

    const data = {
        recommended: [{p:"<20M", wk:2, s1:2, s2:1, s3:1, cs:0}, {p:"20-30M", wk:4, s1:3, s2:2, s3:1, cs:1}, {p:"30-40M", wk:7, s1:5, s2:4, s3:3, cs:2}, {p:">500M", wk:130, s1:120, s2:110, s3:100, cs:85}],
        common: [{p:"<20M", wk:6, s1:5, s2:4, s3:2, cs:1}, {p:"30-40M", wk:28, s1:22, s2:18, s3:14, cs:6}, {p:">500M", wk:650, s1:610, s2:570, s3:500, cs:430}],
        strong: [{p:"<20M", wk:12, s1:9, s2:6, s3:3, cs:1}, {p:"30-40M", wk:48, s1:38, s2:30, s3:24, cs:10}, {p:">500M", wk:1080, s1:1020, s2:960, s3:840, cs:720}]
    };

    function setLang(lang) {
        document.getElementById('btn-de').classList.toggle('active', lang==='de');
        document.getElementById('btn-en').classList.toggle('active', lang==='en');
        document.getElementById('txt-back').innerText = trans[lang].back;
        document.getElementById('txt-title').innerText = trans[lang].title;
        document.getElementById('th-p').innerText = trans[lang].power;
    }

    function updateView(status) {
        const body = document.getElementById('table-body');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id.includes(status.substring(0,3))));
        body.innerHTML = data[status].map(r => `
            <tr>
                <td>${r.p}</td>
                <td class="cost-val">${r.wk}</td>
                <td class="cost-val">${r.s1}</td>
                <td class="cost-val">${r.s2}</td>
                <td class="cost-val">${r.s3}</td>
                <td class="cost-val">${r.cs}</td>
            </tr>
        `).join('');
    }
    updateView('recommended');
</script>
</body>
</html>
