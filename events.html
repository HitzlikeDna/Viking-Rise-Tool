<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viking Rise - Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --viking-blue: #1a3a4a;
            --dark-base: #050709;
            --card-bg: rgba(15, 20, 25, 0.95);
            --text-light: #f4f4f4;
            --text-muted: #a0a0a0;
            --rune-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        body {
            background-color: var(--dark-base);
            background-image: 
                linear-gradient(rgba(5, 7, 9, 0.6), rgba(5, 7, 9, 0.9)), 
                url('viking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 100px 0 120px;
            text-align: center;
            background: linear-gradient(rgba(5, 7, 9, 0.3), rgba(5, 7, 9, 0.8)), url('viking-bg.png');
            background-size: cover;
            position: relative;
            border-bottom: 3px solid var(--gold);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 100%, 0 90%);
            margin-bottom: 40px;
        }

        .lang-switch {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 20;
        }

        .lang-btn {
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            transition: all 0.3s ease;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            margin-left: 10px;
        }

        .lang-btn:hover {
            background: var(--gold);
            color: black;
        }

        .lang-btn.active {
            background: var(--gold);
            color: black;
            box-shadow: var(--rune-shadow);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            font-size: clamp(24px, 5vw, 42px);
            margin: 0;
        }

        .back-nav {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
            z-index: 25;
        }

        .back-btn {
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 20px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .back-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: var(--rune-shadow);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            box-sizing: border-box;
            margin-bottom: 60px;
        }

        .events-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            overflow: hidden;
            transition: 0.3s;
        }

        .event-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: var(--gold);
            transition: 0.3s;
        }

        .event-header:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .event-header::after {
            content: '▼';
            font-size: 12px;
            transition: transform 0.3s;
        }

        .event-card.active .event-header::after {
            transform: rotate(180deg);
        }

        .event-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.3s;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-light);
            line-height: 1.6;
            font-size: 14px;
        }

        .event-card.active .event-content {
            max-height: 1000px;
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .event-content ul {
            margin: 0;
            padding-left: 20px;
        }

        .event-content li {
            margin-bottom: 5px;
        }

        footer {
            width: 100%;
            background: #020304;
            padding: 60px 20px;
            text-align: center;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #1a1a1a;
            box-sizing: border-box;
        }

        .legal-box {
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
            font-style: italic;
        }

        @media (max-width: 768px) {
            header { padding: 80px 0 100px; }
            .lang-switch { top: 15px; right: 15px; }
            .lang-btn { padding: 6px 12px; font-size: 12px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="lang-switch">
        <button id="btn-de" class="lang-btn active" onclick="setLang('de')">DE</button>
        <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <h1 id="main-title">Events</h1>
</header>

<div class="back-nav">
    <a href="index.html" class="back-btn" id="nav-back">« Zurück zur Startseite</a>
</div>

<div class="container">
    <div class="events-section" id="events-container">
        <div class="event-card active">
            <div class="event-header" id="event1-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event1-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event2-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event2-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event3-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event3-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event4-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event4-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event5-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event5-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event6-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event6-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event7-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event7-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event8-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event8-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event9-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event9-content"></div>
        </div>

        <div class="event-card active">
            <div class="event-header" id="event10-header" onclick="toggleEvent(this)"></div>
            <div class="event-content" id="event10-content"></div>
        </div>
    </div>
</div>

<footer>
    <div class="legal-box" id="footer-text">
        <!-- Populated by script -->
    </div>
</footer>

<script>
    let currentLang = 'de';

    const translations = {
        de: {
            back: "« Zurück zur Startseite",
            title: "Event Übersicht",
            legal: "<strong>Rechtlicher Disclaimer:</strong><br>Dies ist eine inoffizielle Webseite von Fans für Fans und steht in keiner Verbindung zu IGG (I Got Games) oder den offiziellen Entwicklern von Viking Rise. Alle Markennamen, Grafiken und Spielinhalte sind Eigentum der jeweiligen Inhaber. Die hier bereitgestellten Informationen und Tools dienen ausschließlich Informationszwecken und sind ohne Gewähr.",
            event1Title: "Claw maschien",
            event1Body: "Mindestens 12 Münzen",
            event2Title: "Mobius-Gipfel",
            event2Body: "Mindestens Runde 12 erreichen um ins Ranking &lt;200 zu kommen",
            event3Title: "Tribe Mobilisation",
            event3Body: "Mindestens 5250 Punkte",
            event4Title: "Vermächtnis-Jagd",
            event4Body: "Mindestens 550 Armbrüste, besser mehr haben",
            event5Title: "„Heros mit gems“",
            event5Body: "Mindestens 50.000 Gems haben (wenn kein Multiplikator nach Runde 2 erscheint --> aufhören)",
            event6Title: "Sammle Vorräte",
            event6Body: "Mit Sammler (max. Truppen) in Zone eins gehen um 40 zu erreichen",
            event7Title: "Wikinger Herrschaft",
            event7Body: "Mindest 8mio Punkte",
            event8Title: "Flag Events",
            event8Body: "900 bis 1200 Würfel um gemeinsam 4 Boote halb voll zu machen<br>(4500/2 = 2250 pro Boot. Würfeldurchschnitt 10.5 Punkte = ca. 225 Würfel im Optimalfall mal 4 Boote = 900 Würfel)",
            event9Title: "Rad Der Ewigkeit",
            event9Body: "Mindestens 39 Stück haben (6x6 +3)",
            event10Title: "S Splitter",
            event10Body: "<ul><li>Flaggen-Event (Boote)</li><li>Wikinger-Triathlon</li><li>Eskortiere Händlerkarawanen</li><li>Glücksrad</li><li>Kochevent</li><li>Tägliches Paket</li><li>Wikinger-Horn</li><li>Schlangen-Trank Event</li><li>Helden-Rettung</li></ul>"
        },
        en: {
            back: "« Back to Home",
            title: "Event Overview",
            legal: "<strong>Legal Disclaimer:</strong><br>This is an unofficial fan website and is not affiliated with IGG (I Got Games) or the official developers of Viking Rise. All brand names, graphics, and game content are the property of their respective owners. The information and tools provided here are for informational purposes only and are without guarantee.",
            event1Title: "Claw Machine",
            event1Body: "At least 12 coins",
            event2Title: "Mobius Peak",
            event2Body: "Reach at least round 12 to get into the ranking &lt;200",
            event3Title: "Tribe Mobilization",
            event3Body: "At least 5250 points",
            event4Title: "Legacy Hunt",
            event4Body: "At least 550 crossbows, better to have more",
            event5Title: "Heroes with Gems",
            event5Body: "Have at least 50,000 gems (if no multiplier appears after round 2 --> stop)",
            event6Title: "Gather Supplies",
            event6Body: "Go to zone one with gatherers (max troops) to reach 40",
            event7Title: "Viking's Reign",
            event7Body: "Minimum 8 million points",
            event8Title: "Flag Events",
            event8Body: "900 to 1200 dice to half-fill 4 boats together<br>(4500/2 = 2250 per boat. Dice average 10.5 points = approx. 225 dice in the optimal case times 4 boats = 900 dice)",
            event9Title: "Wheel Of Eternity",
            event9Body: "Have at least 39 pieces (6x6 +3)",
            event10Title: "S Shards",
            event10Body: "<ul><li>Flag Event (Boats)</li><li>Viking Triathlon</li><li>Escort Merchant Caravans</li><li>Wheel of Fortune</li><li>Cooking Event</li><li>Daily Pack</li><li>Viking Horn</li><li>Snake Potion Event</li><li>Hero Rescue</li></ul>"
        }
    };

    function toggleEvent(header) {
        const card = header.parentElement;
        card.classList.toggle('active');
    }

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btn-de').classList.toggle('active', lang === 'de');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');

        const t = translations[lang];
        document.getElementById('nav-back').innerText = t.back;
        document.getElementById('main-title').innerText = t.title;
        document.getElementById('footer-text').innerHTML = t.legal;
        
        for (let i = 1; i <= 10; i++) {
            const header = document.getElementById(`event${i}-header`);
            const content = document.getElementById(`event${i}-content`);
            if (header) header.innerText = t[`event${i}Title`];
            if (content) content.innerHTML = t[`event${i}Body`];
        }
    }

    setLang(currentLang); // Initial call
</script>

</body>
</html>
