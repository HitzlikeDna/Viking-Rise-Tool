<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viking Rise - Tipps & Tricks</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --viking-blue: #1a3a4a;
            --dark-base: #050709;
            --card-bg: rgba(15, 20, 25, 0.95);
            --text-light: #f4f4f4;
            --text-muted: #a0a0a0;
            --rune-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        body {
            background-color: var(--dark-base);
            background-image: 
                linear-gradient(rgba(5, 7, 9, 0.6), rgba(5, 7, 9, 0.9)), 
                url('viking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 100px 0 120px;
            text-align: center;
            background: linear-gradient(rgba(5, 7, 9, 0.3), rgba(5, 7, 9, 0.8)), url('viking-bg.png');
            background-size: cover;
            position: relative;
            border-bottom: 3px solid var(--gold);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 100%, 0 90%);
            margin-bottom: 40px;
        }

        .lang-switch {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 20;
        }

        .lang-btn {
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            transition: all 0.3s ease;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            margin-left: 10px;
        }

        .lang-btn:hover {
            background: var(--gold);
            color: black;
        }

        .lang-btn.active {
            background: var(--gold);
            color: black;
            box-shadow: var(--rune-shadow);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            font-size: clamp(24px, 5vw, 42px);
            margin: 0;
        }

        .back-nav {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
            z-index: 25;
        }

        .back-btn {
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 20px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .back-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: var(--rune-shadow);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            box-sizing: border-box;
            margin-bottom: 60px;
        }

        .accordion-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .tip-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            overflow: hidden;
            transition: 0.3s;
        }

        .tip-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: var(--gold);
            transition: 0.3s;
        }

        .tip-header:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .tip-header::after {
            content: '▼';
            font-size: 12px;
            transition: transform 0.3s;
        }

        .tip-card.active .tip-header::after {
            transform: rotate(180deg);
        }

        .tip-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.3s;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-light);
            line-height: 1.6;
            font-size: 14px;
        }

        .tip-card.active .tip-content {
            max-height: 1000px;
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .tip-content ol, .tip-content ul {
            padding-left: 20px;
            margin: 0;
        }
        
        .tip-content li {
            margin-bottom: 5px;
        }

        .highlight-text {
            color: var(--gold-bright);
            font-weight: bold;
        }

        .hero-list {
            font-style: italic;
            color: #ddd;
        }

        footer {
            width: 100%;
            background: #020304;
            padding: 60px 20px;
            text-align: center;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #1a1a1a;
            box-sizing: border-box;
        }

        .legal-box {
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
            font-style: italic;
        }

        @media (max-width: 768px) {
            header { padding: 80px 0 100px; }
            .lang-switch { top: 15px; right: 15px; }
            .lang-btn { padding: 6px 12px; font-size: 12px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="lang-switch">
        <button id="btn-de" class="lang-btn active" onclick="setLang('de')">DE</button>
        <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <h1 id="main-title">Strategien & Tipps</h1>
</header>

<div class="back-nav">
    <a href="index.html" class="back-btn" id="nav-back">« Zurück zur Startseite</a>
</div>

<div class="container">
    <div class="accordion-section" id="tips-container">
        <div class="tip-card">
            <div class="tip-header" id="tip1-header" onclick="toggleTip(this)">Wie man 20%-25% Trainingsgeschwindigkeit erhält</div>
            <div class="tip-content" id="tip1-content"></div>
        </div>

        <div class="tip-card">
            <div class="tip-header" id="tip2-header" onclick="toggleTip(this)">Beste Helden zum Goldsammeln in der Stammesmine</div>
            <div class="tip-content" id="tip2-content"></div>
        </div>

        <div class="tip-card">
            <div class="tip-header" id="tip3-header" onclick="toggleTip(this)">Kostenloses Schmiedematerial erhalten</div>
            <div class="tip-content" id="tip3-content"></div>
        </div>
    </div>

    <p style="margin-top: 30px; font-size: 13px; color: var(--gold); text-align: center;"><strong id="today-label">Stand:</strong> <span id="today-date">23. Februar 2026</span></p>
</div>

<footer>
    <div class="legal-box" id="footer-text">
        <!-- Populated by script -->
    </div>
</footer>

<script>
    let currentLang = localStorage.getItem('lang') || 'de';
    let translations = {};

    async function loadTranslations() {
        const response = await fetch('lang.json');
        translations = await response.json();
        setLang(currentLang);
    }

    function toggleTip(header) {
        const card = header.parentElement;
        card.classList.toggle('active');
    }

    function setLang(lang) {
        localStorage.setItem('lang', lang);
        currentLang = lang;
        document.getElementById('btn-de').classList.toggle('active', lang === 'de');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');

        const t = translations[lang].tipsandTricks;

        document.getElementById('nav-back').innerText = t.back;
        document.getElementById('main-title').innerText = t.title;
        document.getElementById('today-label').innerText = t.today;
        document.getElementById('today-date').innerText = t.date;
        document.getElementById('footer-text').innerHTML = t.legal;
        
        document.getElementById('tip1-header').innerText = t.tip1Title;
        document.getElementById('tip1-content').innerHTML = t.tip1Body;
        document.getElementById('tip2-header').innerText = t.tip2Title;
        document.getElementById('tip2-content').innerHTML = t.tip2Body;
        document.getElementById('tip3-header').innerText = t.tip3Title;
        document.getElementById('tip3-content').innerHTML = t.tip3Body;
    }

    loadTranslations();
</script>

</body>
</html>
