<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viking Rise - Gebäude Kosten</title>

    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --dark-base: #050709;
            --card-bg: rgba(15, 20, 25, 0.95);
            --text-light: #f4f4f4;
            --text-muted: #a0a0a0;
            --sidebar-bg: rgba(10, 12, 16, 0.95);
            --active-item: rgba(212, 175, 55, 0.15);
        }

        body {
            background-color: var(--dark-base);
            background-image: linear-gradient(rgba(5, 7, 9, 0.7), rgba(5, 7, 9, 0.9)), url('viking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Compact for this page */
        header {
            width: 100%;
            padding: 20px 40px;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
        }

        .back-btn {
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 20px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            font-size: 14px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--gold);
            color: black;
        }

        .lang-switch button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            transition: 0.3s;
        }

        .lang-switch button.active {
            background: var(--gold);
            color: black;
        }

        /* Layout */
        .main-wrapper {
            display: flex;
            flex: 1;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: calc(100vh - 80px);
            position: sticky;
            top: 80px;
        }

        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            color: var(--text-muted);
            font-family: 'Cinzel', serif;
            transition: 0.3s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-light);
        }

        .nav-item.active {
            background: var(--active-item);
            color: var(--gold);
            border-left-color: var(--gold);
        }

        /* Content */
        .content-area {
            flex: 1;
            padding: 40px;
            overflow-x: hidden;
        }

        .mobile-select {
            display: none;
            width: 100%;
            padding: 15px;
            background: #111;
            color: var(--gold);
            border: 1px solid var(--gold);
            font-family: 'Cinzel', serif;
            margin-bottom: 20px;
            font-size: 16px;
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold-bright);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .table-wrapper {
            overflow-x: auto;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            margin-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            white-space: nowrap;
        }

        tr:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        .res-val { font-family: monospace; font-size: 1.1em; }
        .res-food { color: #ff7f50; }
        .res-wood { color: #deb887; }
        .res-stone { color: #a9a9a9; }
        .res-special { color: #00bfff; font-weight: bold; }

        footer {
            background: #020304;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #1a1a1a;
        }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-select { display: block; }
            .content-area { padding: 20px; }
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .header-left { flex-direction: column; gap: 10px; }
        }
    </style>
</head>

        chiefHall: { costs: rawData.chiefHallCosts, req: rawData.chiefHallRequirements },
        hallOfValor: { costs: rawData.hallOfValorCosts },
        academy: { costs: rawData.academyCosts },
        wall: { costs: rawData.wallCosts },
        tribeHall: { costs: rawData.tribeHallCosts },
        battleHall: { costs: rawData.battleHallCosts },
        defenceTower: { costs: rawData.defenceTowerCosts },

        eaglesNest: { costs: rawData.eaglesNestCosts },
        warehouse: { costs: rawData.warehouseCosts },
        divinationShack: { costs: rawData.divinationShackCosts }
    };

    let currentLang = localStorage.getItem('lang') || 'de';
    let translations = {};
    let currentBuilding = 'chiefHall';

    async function loadTranslations() {
        const response = await fetch('lang.json');
        translations = await response.json();
        setLang(currentLang);
    }

    function setLang(lang) {
        localStorage.setItem('lang', lang);
        currentLang = lang;
        document.getElementById('btn-de').classList.toggle('active', lang === 'de');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');

        const t = translations[lang].buildings;
        document.getElementById('page-title').innerText = t.title;
        document.getElementById('nav-back').innerText = t.back;
        document.getElementById('footer-text').innerHTML = t.legal;

        renderNavigation();
        renderContent();
    }

    function renderNavigation() {
        const t = translations[currentLang].buildings;
        const sidebar = document.getElementById('sidebar-nav');
        const mobileSel = document.getElementById('mobile-select');

        sidebar.innerHTML = '';
        mobileSel.innerHTML = '';

        buildingKeys.forEach(key => {
            // Sidebar Item
            const div = document.createElement('div');
            div.className = `nav-item ${key === currentBuilding ? 'active' : ''}`;
            div.innerText = t.names[key];
            div.onclick = () => selectBuilding(key);
            sidebar.appendChild(div);

            // Mobile Option
            const opt = document.createElement('option');
            opt.value = key;
            opt.innerText = t.names[key];
            opt.selected = key === currentBuilding;
            mobileSel.appendChild(opt);
        });
    }

    function selectBuilding(key) {
        currentBuilding = key;
        renderNavigation();
        renderContent();
    }

    function formatNum(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.0', '') + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1).replace('.0', '') + 'k';
        return num;
    }

    function renderContent() {
        const t = translations[currentLang].buildings;
        const container = document.getElementById('content-display');
        const data = dataMap[currentBuilding];
        
        container.innerHTML = `<h2>${t.names[currentBuilding]}</h2>`;

        // Requirements Table (Only for Chief Hall)
        if (data.req) {
            let reqHtml = `<h3>${t.req}</h3><div class="table-wrapper"><table><thead><tr>
                <th>${t.level}</th><th>Req 1</th><th>Req 2</th><th>Req 3</th>
            </tr></thead><tbody>`;
            
            data.req.forEach(row => {
                reqHtml += `<tr>
                    <td>${row.ch}</td>
                    <td>${row.r1 || '-'}</td>
                    <td>${row.r2 || '-'}</td>
                    <td>${row.r3 || '-'}</td>
                </tr>`;
            });
            reqHtml += '</tbody></table></div>';
            container.innerHTML += reqHtml;
        }

        // Costs Table
        let costHtml = `<h3>${t.title}</h3><div class="table-wrapper"><table><thead><tr>
            <th>${t.level}</th>
            <th>${t.food}</th>
            <th>${t.wood}</th>
            <th>${t.stone}</th>`;
        
        // Check for special columns
        const hasWarHorn = data.costs.some(r => r.warHorn);
        const hasSpike = data.costs.some(r => r.thornySpike);

        if (hasWarHorn) costHtml += `<th>${t.special}</th>`;
        if (hasSpike) costHtml += `<th>${t.special}</th>`;

        costHtml += `</tr></thead><tbody>`;

        data.costs.forEach(row => {
            costHtml += `<tr>
                <td>${row.level}</td>
                <td class="res-val res-food">${formatNum(row.food)}</td>
                <td class="res-val res-wood">${formatNum(row.wood)}</td>
                <td class="res-val res-stone">${formatNum(row.stone)}</td>`;
            
            if (hasWarHorn) costHtml += `<td class="res-val res-special">${row.warHorn || '-'}</td>`;
            if (hasSpike) costHtml += `<td class="res-val res-special">${row.thornySpike || '-'}</td>`;

            costHtml += `</tr>`;
        });

        costHtml += '</tbody></table></div>';
        container.innerHTML += costHtml;
    }

    loadTranslations();
